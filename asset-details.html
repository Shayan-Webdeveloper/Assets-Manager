<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Asset Details — MaintainIQ</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="css/style.css" rel="stylesheet">
</head>
<body>

<div class="app-shell">
  <aside class="sidebar">
    <div class="brand"><span class="dot"></span> MaintainIQ</div>
    <div class="tagline">Scan. Report. Diagnose. Maintain.</div>
    <nav>
      <a href="dashboard.html">📊 Dashboard</a>
      <a href="assets.html" class="active">🗂️ Assets</a>
      <a href="issues.html">🛠️ Issues</a>
    </nav>
    <div class="foot">
      <div id="whoami" class="mb-2 text-white-50"></div>
      <button onclick="logout()">Sign out →</button>
    </div>
  </aside>

  <main class="main" id="mainContent" style="display:none">
    <div class="topbar">
      <div>
        <div class="eyebrow" id="assetCodeLabel">—</div>
        <h1 class="fs-3 mb-0" id="assetNameLabel">—</h1>
      </div>
      <div class="d-flex gap-2">
        <a href="#" target="_blank" id="openPublicBtn" class="btn btn-outline-mq">Open Public Page ↗</a>
        <button class="btn btn-signal" data-bs-toggle="modal" data-bs-target="#editModal">Edit Asset</button>
      </div>
    </div>

    <div class="row g-3">
      <div class="col-lg-4">
        <div class="card-mq text-center mb-3">
          <div class="qr-frame mb-3">
            <div class="br-tl"></div><div class="br-br"></div>
            <img id="qrImg" alt="Asset QR code" crossorigin="anonymous">
          </div>
          <div class="d-flex gap-2 justify-content-center">
            <button class="btn btn-outline-mq btn-sm" onclick="downloadQR()">Download QR</button>
            <button class="btn btn-outline-mq btn-sm" onclick="copyLink()">Copy Link</button>
          </div>
          <div class="small text-muted mt-2" id="linkPreview"></div>
        </div>

        <div class="card-mq">
          <h2 class="fs-6 fw-bold mb-2">Asset Info</h2>
          <div class="small mb-1"><strong>Category:</strong> <span id="infoCategory"></span></div>
          <div class="small mb-1"><strong>Location:</strong> <span id="infoLocation"></span></div>
          <div class="small mb-1"><strong>Condition:</strong> <span id="infoCondition"></span></div>
          <div class="small mb-1"><strong>Status:</strong> <span id="infoStatus"></span></div>
          <div class="small mb-1"><strong>Last service:</strong> <span id="infoLastService"></span></div>
          <div class="small mb-3"><strong>Next service:</strong> <span id="infoNextService"></span></div>
          <label>Update status</label>
          <select class="form-select" id="statusSelect">
            <option>Operational</option><option>Issue Reported</option><option>Under Inspection</option>
            <option>Under Maintenance</option><option>Out of Service</option><option>Retired</option>
          </select>
        </div>
      </div>

      <div class="col-lg-8">
        <div class="card-mq mb-3">
          <div class="d-flex justify-content-between align-items-center mb-2">
            <h2 class="fs-6 fw-bold mb-0">Related Issues</h2>
            <a href="issues.html" class="small">View all →</a>
          </div>
          <div id="relatedIssues"></div>
        </div>
        <div class="card-mq">
          <h2 class="fs-6 fw-bold mb-3">Asset History</h2>
          <div id="historyTimeline" class="timeline"></div>
        </div>
      </div>
    </div>
  </main>
</div>

<!-- Edit modal -->
<div class="modal fade" id="editModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header"><h5 class="modal-title">Edit Asset</h5><button class="btn-close" data-bs-dismiss="modal"></button></div>
      <div class="modal-body">
        <form id="editForm">
          <label>Name</label><input class="form-control mb-3" id="e_name" required>
          <div class="row">
            <div class="col-6"><label>Category</label><input class="form-control mb-3" id="e_category" required></div>
            <div class="col-6"><label>Location</label><input class="form-control mb-3" id="e_location" required></div>
          </div>
          <div class="row">
            <div class="col-6"><label>Condition</label>
              <select class="form-select mb-3" id="e_condition"><option>Good</option><option>Fair</option><option>Poor</option></select>
            </div>
            <div class="col-6"><label>Next service</label><input type="date" class="form-control mb-3" id="e_next_service"></div>
          </div>
          <button class="btn btn-mq w-100">Save Changes</button>
        </form>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/supabase-client.js"></script>
<script>
const params = new URLSearchParams(location.search);
const ASSET_ID = params.get("id");
let CURRENT_ASSET = null;
let CURRENT_PROFILE = null;

function publicUrl(code) {
  return `${location.origin}${location.pathname.replace("asset-details.html","")}public-asset.html?code=${code}`;
}

async function loadAsset() {
  const { data: asset } = await sb.from("assets").select("*").eq("id", ASSET_ID).single();
  if (!asset) { alert("Asset not found."); location.href = "assets.html"; return; }
  CURRENT_ASSET = asset;

  document.getElementById("assetCodeLabel").textContent = asset.asset_code;
  document.getElementById("assetNameLabel").textContent = asset.name;
  document.getElementById("infoCategory").textContent = asset.category;
  document.getElementById("infoLocation").textContent = asset.location;
  document.getElementById("infoCondition").textContent = asset.condition;
  document.getElementById("infoStatus").textContent = asset.status;
  document.getElementById("infoLastService").textContent = fmtDate(asset.last_service_date);
  document.getElementById("infoNextService").textContent = fmtDate(asset.next_service_date);
  document.getElementById("statusSelect").value = asset.status;

  const url = publicUrl(asset.asset_code);
  document.getElementById("openPublicBtn").href = url;
  document.getElementById("linkPreview").textContent = url;

  // QR generated via image API (no JS library / CDN script dependency —
  // more resilient to ad-blockers and network script filters than a JS lib)
  const qrImgUrl = `https://api.qrserver.com/v1/create-qr-code/?size=300x300&margin=0&data=${encodeURIComponent(url)}`;
  const qrImg = document.getElementById("qrImg");
  qrImg.src = qrImgUrl;
  qrImg.onerror = () => {
    document.querySelector(".qr-frame").innerHTML = `<div class="small text-muted p-3">QR code unavailable — reload the page.<br><a href="${url}" target="_blank">Open public link ↗</a></div>`;
  };

  // prefill edit modal
  document.getElementById("e_name").value = asset.name;
  document.getElementById("e_category").value = asset.category;
  document.getElementById("e_location").value = asset.location;
  document.getElementById("e_condition").value = asset.condition;
  document.getElementById("e_next_service").value = asset.next_service_date || "";

  document.getElementById("mainContent").style.display = "block";
}

async function loadRelatedIssues() {
  const { data: issues } = await sb.from("issues").select("*").eq("asset_id", ASSET_ID).order("created_at", { ascending: false }).limit(5);
  const el = document.getElementById("relatedIssues");
  if (!issues?.length) { el.innerHTML = `<div class="empty-state py-3"><div class="icon">🛠️</div>No issues reported for this asset yet.</div>`; return; }
  el.innerHTML = issues.map(i => `
    <a href="issue-details.html?id=${i.id}" class="d-flex justify-content-between align-items-center py-2 border-bottom text-decoration-none text-dark">
      <div>
        <div class="fw-semibold small">${i.title}</div>
        <div class="asset-code text-muted" style="font-size:.72rem">${i.issue_number} · ${fmtDate(i.created_at)}</div>
      </div>
      <div class="d-flex gap-2">
        <span class="tag ${priorityTagClass(i.priority)}">${i.priority}</span>
        <span class="tag ${statusTagClass(i.status)}">${i.status}</span>
      </div>
    </a>`).join("");
}

async function loadHistory() {
  const { data: history } = await sb.from("asset_history").select("*").eq("asset_id", ASSET_ID).order("created_at", { ascending: false });
  const el = document.getElementById("historyTimeline");
  if (!history?.length) { el.innerHTML = `<div class="empty-state py-3"><div class="icon">🕘</div>No history yet.</div>`; return; }
  el.innerHTML = history.map(h => `
    <div class="timeline-item">
      <div class="when">${fmtDate(h.created_at)}</div>
      <div class="what">${h.action}</div>
      <div class="who">by ${h.actor_name}${h.details ? " — " + h.details : ""}</div>
    </div>`).join("");
}

async function downloadQR() {
  try {
    const res = await fetch(document.getElementById("qrImg").src);
    const blob = await res.blob();
    const blobUrl = URL.createObjectURL(blob);
    const link = document.createElement("a");
    link.download = `${CURRENT_ASSET.asset_code}-qr.png`;
    link.href = blobUrl;
    link.click();
    URL.revokeObjectURL(blobUrl);
  } catch (err) {
    // Fallback: open the QR image directly so the user can save it manually
    window.open(document.getElementById("qrImg").src, "_blank");
  }
}
function copyLink() {
  navigator.clipboard.writeText(publicUrl(CURRENT_ASSET.asset_code));
  alert("Public link copied to clipboard.");
}

document.getElementById("statusSelect").addEventListener("change", async (e) => {
  const newStatus = e.target.value;
  const oldStatus = CURRENT_ASSET.status;
  if (newStatus === oldStatus) return;
  await sb.from("assets").update({ status: newStatus }).eq("id", ASSET_ID);
  await logHistory(ASSET_ID, CURRENT_PROFILE.full_name, "Status changed", `${oldStatus} → ${newStatus}`);
  CURRENT_ASSET.status = newStatus;
  document.getElementById("infoStatus").textContent = newStatus;
  loadHistory();
});

document.getElementById("editForm").addEventListener("submit", async (e) => {
  e.preventDefault();
  const updates = {
    name: document.getElementById("e_name").value.trim(),
    category: document.getElementById("e_category").value.trim(),
    location: document.getElementById("e_location").value.trim(),
    condition: document.getElementById("e_condition").value,
    next_service_date: document.getElementById("e_next_service").value || null
  };
  await sb.from("assets").update(updates).eq("id", ASSET_ID);
  await logHistory(ASSET_ID, CURRENT_PROFILE.full_name, "Asset details updated", null);
  bootstrap.Modal.getInstance(document.getElementById("editModal")).hide();
  loadAsset(); loadHistory();
});

(async function init() {
  const session = await requireAuth();
  if (!session) return;
  CURRENT_PROFILE = await getCurrentProfile();
  document.getElementById("whoami").textContent = `${CURRENT_PROFILE.full_name} · ${CURRENT_PROFILE.role}`;
  if (!ASSET_ID) { location.href = "assets.html"; return; }
  await loadAsset();
  await loadRelatedIssues();
  await loadHistory();
})();
</script>
</body>
</html>
