<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Issues — MaintainIQ</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="css/style.css" rel="stylesheet">
</head>
<body>
<button class="menu-btn" onclick="toggleSidebar()">
  ☰
</button>

<div class="overlay" onclick="toggleSidebar()"></div>
<div class="app-shell">
  <aside class="sidebar" id="sidebar">
    <div class="brand"><span class="dot"></span> MaintainIQ</div>
    <div class="tagline">Scan. Report. Diagnose. Maintain.</div>
    <nav>
    <a href="dashboard.html" onclick="closeSidebar()">📊 Dashboard</a>
    <a href="assets.html" onclick="closeSidebar()">🗂️ Assets</a>
    <a href="issues.html" class="active" onclick="closeSidebar()">🛠️ Issues</a>
</nav>
    <div class="foot">
      <div id="whoami" class="mb-2 text-white-50"></div>
      <button onclick="logout()">Sign out →</button>
    </div>
  </aside>

  <main class="main">
    <div class="topbar">
      <div>
        <div class="eyebrow">Workflow</div>
        <h1 class="fs-3 mb-0">Issues</h1>
      </div>
    </div>

    <div class="card-mq mb-3 d-flex flex-wrap gap-2 align-items-center">
      <input type="text" class="form-control" style="max-width:220px" id="searchInput" placeholder="Search title or #…">
      <select class="form-select" style="max-width:180px" id="statusFilter">
        <option value="">All statuses</option>
        <option>Reported</option><option>Assigned</option><option>Inspection Started</option>
        <option>Maintenance In Progress</option><option>Waiting for Parts</option>
        <option>Resolved</option><option>Closed</option><option>Reopened</option>
      </select>
      <select class="form-select" style="max-width:160px" id="priorityFilter">
        <option value="">All priorities</option><option>Low</option><option>Medium</option><option>High</option><option>Critical</option>
      </select>
    </div>

    <div class="table-responsive">
      <table class="table table-mq align-middle">
        <thead><tr><th>Issue #</th><th>Title</th><th>Asset</th><th>Priority</th><th>Status</th><th>Reported</th></tr></thead>
        <tbody id="issuesBody"></tbody>
      </table>
    </div>
    <div id="emptyState"></div>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-client.js"></script>
<script>
let ALL_ISSUES = [];

async function loadIssues() {
  const { data: issues } = await sb.from("issues").select("*, assets(name, asset_code)").order("created_at", { ascending: false });
  ALL_ISSUES = issues || [];
  render();
}

function render() {
  const q = document.getElementById("searchInput").value.toLowerCase();
  const status = document.getElementById("statusFilter").value;
  const priority = document.getElementById("priorityFilter").value;

  const filtered = ALL_ISSUES.filter(i =>
    (!q || i.title.toLowerCase().includes(q) || i.issue_number.toLowerCase().includes(q)) &&
    (!status || i.status === status) &&
    (!priority || i.priority === priority)
  );

  const body = document.getElementById("issuesBody");
  const empty = document.getElementById("emptyState");
  if (!filtered.length) {
    body.innerHTML = "";
    empty.innerHTML = `<div class="empty-state"><div class="icon">🛠️</div>No issues match your filters.</div>`;
    return;
  }
  empty.innerHTML = "";
  body.innerHTML = filtered.map(i => `
    <tr onclick="location.href='issue-details.html?id=${i.id}'" style="cursor:pointer">
      <td class="asset-code">${i.issue_number}</td>
      <td>${i.title}</td>
      <td class="small">${i.assets?.name ?? "—"} <span class="text-muted">(${i.assets?.asset_code ?? ""})</span></td>
      <td><span class="tag ${priorityTagClass(i.priority)}">${i.priority}</span></td>
      <td><span class="tag ${statusTagClass(i.status)}">${i.status}</span></td>
      <td class="small text-muted">${fmtDate(i.created_at)}</td>
    </tr>`).join("");
}

document.getElementById("searchInput").addEventListener("input", render);
document.getElementById("statusFilter").addEventListener("change", render);
document.getElementById("priorityFilter").addEventListener("change", render);

(async function init() {
  const session = await requireAuth();
  if (!session) return;
  const profile = await getCurrentProfile();
  document.getElementById("whoami").textContent = `${profile.full_name} · ${profile.role}`;
  await loadIssues();
})();
function toggleSidebar() {
    document.getElementById("sidebar").classList.toggle("open");
    document.querySelector(".overlay").classList.toggle("show");
}
function closeSidebar() {
    if (window.innerWidth <= 900) {
        document.getElementById("sidebar").classList.remove("open");
        document.querySelector(".overlay").classList.remove("show");
    }
}
</script>
</body>
</html>
