<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dashboard — MaintainIQ</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="css/style.css" rel="stylesheet">
</head>
<body>
<button class="menu-btn" onclick="toggleSidebar()">
  ☰
</button>

<div class="overlay" onclick="toggleSidebar()"></div>
<div class="app-shell">
  <aside class="sidebar" id="sidebar">
    <div class="brand"><span class="dot"></span> MaintainIQ</div>
    <div class="tagline">Scan. Report. Diagnose. Maintain.</div>
    <nav>
    <a href="dashboard.html" class="active" onclick="closeSidebar()">📊 Dashboard</a>
    <a href="assets.html" onclick="closeSidebar()">🗂️ Assets</a>
    <a href="issues.html" onclick="closeSidebar()">🛠️ Issues</a>
</nav>
    <div class="foot">
      <div id="whoami" class="mb-2 text-white-50"></div>
      <button onclick="logout()">Sign out →</button>
    </div>
  </aside>

  <main class="main">
    <div class="topbar">
      <div>
        <div class="eyebrow">Overview</div>
        <h1 class="fs-3 mb-0">Dashboard</h1>
      </div>
      <a href="assets.html?new=1" class="btn btn-signal">+ Register Asset</a>
    </div>

    <div class="row g-3 mb-4">
      <div class="col-md-3">
        <div class="card-mq stat-card"><div class="bar"></div>
          <div class="num" id="statAssets">—</div><div class="label">Total assets</div></div>
      </div>
      <div class="col-md-3">
        <div class="card-mq stat-card"><div class="bar" style="background:var(--warn)"></div>
          <div class="num" id="statOpen">—</div><div class="label">Open issues</div></div>
      </div>
      <div class="col-md-3">
        <div class="card-mq stat-card"><div class="bar" style="background:var(--alert)"></div>
          <div class="num" id="statCritical">—</div><div class="label">Critical priority</div></div>
      </div>
      <div class="col-md-3">
        <div class="card-mq stat-card"><div class="bar" style="background:var(--ok)"></div>
          <div class="num" id="statResolved">—</div><div class="label">Resolved this month</div></div>
      </div>
    </div>

    <div class="row g-3">
      <div class="col-lg-7">
        <div class="card-mq">
          <h2 class="fs-6 fw-bold mb-3">Assets needing attention</h2>
          <div id="attentionList"></div>
        </div>
      </div>
      <div class="col-lg-5">
        <div class="card-mq">
          <h2 class="fs-6 fw-bold mb-3">Recent activity</h2>
          <div id="recentActivity" class="timeline"></div>
        </div>
      </div>
    </div>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-client.js"></script>
<script>
(async function init() {
  const session = await requireAuth();
  if (!session) return;
  const profile = await getCurrentProfile();
  document.getElementById("whoami").textContent = `${profile.full_name} · ${profile.role}`;

  const { data: assets } = await sb.from("assets").select("*");
  const { data: issues } = await sb.from("issues").select("*");
  const { data: history } = await sb.from("asset_history").select("*").order("created_at", { ascending: false }).limit(8);

  document.getElementById("statAssets").textContent = assets?.length ?? 0;
  const openIssues = (issues || []).filter(i => !["Resolved", "Closed"].includes(i.status));
  document.getElementById("statOpen").textContent = openIssues.length;
  document.getElementById("statCritical").textContent = openIssues.filter(i => i.priority === "Critical").length;

  const now = new Date(); const monthAgo = new Date(now.getFullYear(), now.getMonth(), 1);
  const resolvedThisMonth = (issues || []).filter(i => i.status === "Resolved" && new Date(i.created_at) >= monthAgo);
  document.getElementById("statResolved").textContent = resolvedThisMonth.length;

  // assets needing attention: not Operational
  const attention = (assets || []).filter(a => !["Operational", "Retired"].includes(a.status));
  const list = document.getElementById("attentionList");
  if (!attention.length) {
    list.innerHTML = `<div class="empty-state py-3"><div class="icon">✅</div>All assets are operational.</div>`;
  } else {
    list.innerHTML = attention.map(a => `
      <div class="d-flex justify-content-between align-items-center py-2 border-bottom">
        <div>
          <a href="asset-details.html?id=${a.id}" class="fw-semibold text-dark text-decoration-none">${a.name}</a>
          <div class="asset-code text-muted small">${a.asset_code} · ${a.location}</div>
        </div>
        <span class="tag ${statusTagClass(a.status)}">${a.status}</span>
      </div>`).join("");
  }

  const act = document.getElementById("recentActivity");
  if (!history?.length) {
    act.innerHTML = `<div class="empty-state py-3"><div class="icon">🕘</div>No activity yet.</div>`;
  } else {
    act.innerHTML = history.map(h => `
      <div class="timeline-item">
        <div class="when">${fmtDate(h.created_at)}</div>
        <div class="what">${h.action}</div>
        <div class="who">by ${h.actor_name}${h.details ? " — " + h.details : ""}</div>
      </div>`).join("");
  }
})();
function toggleSidebar() {
    document.getElementById("sidebar").classList.toggle("open");
    document.querySelector(".overlay").classList.toggle("show");
}
function closeSidebar() {
    if (window.innerWidth <= 900) {
        document.getElementById("sidebar").classList.remove("open");
        document.querySelector(".overlay").classList.remove("show");
    }
}
</script>
</body>
</html>
