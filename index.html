<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MaintainIQ — Sign In</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="css/style.css" rel="stylesheet">

<body>

<div class="auth-wrap py-5">
  <div>

    <div class="auth-card">
      <div class="d-flex align-items-center gap-2 mb-1">
      <span class="dot" style="width:9px;height:9px;border-radius:50%;background:var(--signal);display:inline-block;"></span>
      <span class="display fw-bold fs-4">MaintainIQ</span>
    </div>
    <p class="text-muted small mb-4">Scan. Report. Diagnose. Maintain.</p>

    <div id="alertBox" class="alert alert-danger d-none py-2 small"></div>

    <form id="loginForm">
      <label>Email</label>
      <input type="email" class="form-control mb-3" id="email" required placeholder="you@organization.com">
      <label>Password</label>
      <input type="password" class="form-control mb-4" id="password" required placeholder="••••••••">
      <button type="submit" class="btn btn-mq w-100" id="loginBtn">Sign In</button>
    </form>

    <p class="text-center small text-muted mt-4 mb-0">
      New administrator? <a href="register.html">Create an account</a>
    </p>
  </div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-client.js"></script>
<script>
document.getElementById("loginForm").addEventListener("submit", async (e) => {
  e.preventDefault();
  const btn = document.getElementById("loginBtn");
  const alertBox = document.getElementById("alertBox");
  alertBox.classList.add("d-none");
  btn.disabled = true; btn.textContent = "Signing in…";

  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;

  const { error } = await sb.auth.signInWithPassword({ email, password });

  if (error) {
    alertBox.textContent = error.message;
    alertBox.classList.remove("d-none");
    btn.disabled = false; btn.textContent = "Sign In";
    return;
  }
  window.location.href = "dashboard.html";
});

// If already logged in, skip straight to dashboard
(async () => {
  const { data: { session } } = await sb.auth.getSession();
  if (session) window.location.href = "dashboard.html";
})();
</script>
</body>
