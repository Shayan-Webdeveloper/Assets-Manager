<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MaintainIQ — Create Account</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="css/style.css" rel="stylesheet">
</head>
<body>

<div class="auth-wrap">
  <div class="auth-card">
    <div class="d-flex align-items-center gap-2 mb-1">
      <span style="width:9px;height:9px;border-radius:50%;background:var(--signal);display:inline-block;"></span>
      <span class="display fw-bold fs-4">MaintainIQ</span>
    </div>
    <p class="text-muted small mb-4">Create your team account</p>

    <div id="alertBox" class="alert alert-danger d-none py-2 small"></div>
    <div id="successBox" class="alert alert-success d-none py-2 small"></div>

    <form id="regForm">
      <label>Full name</label>
      <input type="text" class="form-control mb-3" id="fullName" required placeholder="Shayan Ahmed">
      <label>Role</label>
      <select class="form-select mb-3" id="role">
        <option value="admin">Administrator</option>
        <option value="technician">Technician</option>
      </select>
      <label>Email</label>
      <input type="email" class="form-control mb-3" id="email" required placeholder="you@organization.com">
      <label>Password</label>
      <input type="password" class="form-control mb-4" id="password" required minlength="6" placeholder="At least 6 characters">
      <button type="submit" class="btn btn-mq w-100" id="regBtn">Create Account</button>
    </form>

    <p class="text-center small text-muted mt-4 mb-0">
      Already have an account? <a href="index.html">Sign in</a>
    </p>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-client.js"></script>
<script>
document.getElementById("regForm").addEventListener("submit", async (e) => {
  e.preventDefault();
  const btn = document.getElementById("regBtn");
  const alertBox = document.getElementById("alertBox");
  const successBox = document.getElementById("successBox");
  alertBox.classList.add("d-none"); successBox.classList.add("d-none");
  btn.disabled = true; btn.textContent = "Creating…";

  const full_name = document.getElementById("fullName").value.trim();
  const role = document.getElementById("role").value;
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;

const { data, error } = await sb.auth.signUp({
  email,
  password
});

  if (error) {
    alertBox.textContent = error.message;
    alertBox.classList.remove("d-none");
    btn.disabled = false; btn.textContent = "Create Account";
    return;
  }

  // Create the profile row (role lives here, not in auth.users)
if (data.user) {
  await sb.from("profiles").insert({
    id: data.user.id,
    full_name,
    role
  });
}

  successBox.textContent = "Account created. If email confirmation is enabled on your project, check your inbox — otherwise you can sign in now.";
  successBox.classList.remove("d-none");
  btn.disabled = false; btn.textContent = "Create Account";
  setTimeout(() => window.location.href = "index.html", 2200);
});
</script>
</body>
</html>
